<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive GIF met Klikbaar Deel</title>
    <style>
        /* Zorgt dat de GIF in het midden van de pagina komt */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #131313; /* Achtergrondkleur van je pagina */
        }

        /* De container die de GIF en de link vasthoudt */
        .interactive-container {
            position: relative;
            width: 90%;      /* Neemt 90% van de breedte van het scherm in */
            max-width: 1000px; /* Wordt nooit groter dan 1000px */
            line-height: 0;  /* Voorkomt witruimte onder de afbeelding */
        }

        /* De GIF zelf */
        .interactive-container img {
            width: 100%;
            height: auto;
            border-radius: 8px; /* Optioneel: ronde hoekjes */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Het onzichtbare klikbare vlak */
        .click-zone {
            position: absolute;
            
            /* PAS DEZE PERCENTAGES AAN */
            top: 95%;       /* Hoe ver van boven? */
            left: 90%;      /* Hoe ver van links? */
            width: 6%;     /* Hoe breed is het vak? */
            height: 3%;    /* Hoe hoog is het vak? */

            /* Test-instelling: verander 'transparent' naar 'rgba(255,0,0,0.5)' 
               om een rood vlak te zien terwijl je de positie bepaalt. */
            background-color: rgba(255,0,0,0.5); 
            
            cursor: pointer;
            z-index: 2;
        }

        /* Effect wanneer je met de muis over het klikbare deel gaat (optioneel) */
        .click-zone:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="interactive-container">
        <img src="examples.gif" alt="Interactieve GIF">

        <a href="https://jouwbestemming.nl" class="click-zone" title="Klik hier!"></a>
    </div>

</body>
</html>
