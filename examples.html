<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>examples work</title>
    <style>
        /* Zorg dat de pagina geen marges heeft en de volledige hoogte gebruikt */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Voorkomt scrollen */
            background-color: #131313; /* Optioneel: zwarte achtergrond voor de randen */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .fullscreen-gif {
            /* Zorgt dat de GIF zich aanpast aan het scherm */
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Behoudt de verhoudingen zonder de GIF af te snijden */
        }
    </style>
</head>
<body>

    <img src="examples.gif" usemap="#image-map">
<map name="image-map">
    <area target="" alt="" title="" href="#" coords="821,51,1316,449" shape="rect"></area>
</map>

</body>
</html>
